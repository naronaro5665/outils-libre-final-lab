plugins {
    id 'java'
    id 'application'
}

group = 'com.pricing'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'  // ← هذا السطر مهم
}
application {
    mainClass = 'com.pricing.App'
}

test {
    useJUnitPlatform()
}